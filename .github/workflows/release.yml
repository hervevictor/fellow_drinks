name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'   # déclenché sur git tag v1.0.0, v1.2.3, etc.

jobs:
  # ─────────────────────────────────────────────────────────────────
  # APK Android (Ubuntu — rapide, gratuit)
  # ─────────────────────────────────────────────────────────────────
  android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > android/app/fellow_drink_release.jks

      - name: Build release APK
        env:
          KEYSTORE_PATH: fellow_drink_release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: flutter build apk --release --obfuscate --split-debug-info=build/debug-info

      - name: Rename APK
        run: |
          VERSION="${{ github.ref_name }}"
          cp build/app/outputs/flutter-apk/app-release.apk \
             fellow_drink_${VERSION}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: fellow_drink_*.apk

  # ─────────────────────────────────────────────────────────────────
  # IPA iOS (macOS — nécessite Apple Developer account pour distribuer)
  # ─────────────────────────────────────────────────────────────────
  ios:
    name: iOS IPA
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: cd ios && pod install

      - name: Import signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          CERT_PASSWORD:   ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROV_PROFILE:    ${{ secrets.IOS_PROV_PROFILE_BASE64 }}
        run: |
          # Keychain temporaire
          KEYCHAIN=build.keychain
          security create-keychain -p "" $KEYCHAIN
          security default-keychain -s $KEYCHAIN
          security unlock-keychain -p "" $KEYCHAIN
          security set-keychain-settings -lut 21600 $KEYCHAIN

          # Certificat de distribution
          echo "$CERT_P12_BASE64" | base64 --decode > cert.p12
          security import cert.p12 -k $KEYCHAIN -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "" $KEYCHAIN

          # Profil de provisioning
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROV_PROFILE" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/dist.mobileprovision

      - name: Build iOS release (no codesign)
        run: |
          flutter build ios --release --no-codesign

      - name: Build IPA with xcodebuild
        run: |
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/Runner.xcarchive \
            archive
          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportPath build/ios-ipa \
            -exportOptionsPlist ios/ExportOptions.plist

      - name: Rename IPA
        run: |
          VERSION="${{ github.ref_name }}"
          cp build/ios-ipa/Runner.ipa fellow_drink_${VERSION}.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: fellow_drink_*.ipa

  # ─────────────────────────────────────────────────────────────────
  # GitHub Release — attache APK + IPA
  # ─────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [android, ios]
    runs-on: ubuntu-latest
    # Continue même si iOS échoue (pas de cert configuré)
    if: always() && needs.android.result == 'success'

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk

      - name: Download IPA (si disponible)
        uses: actions/download-artifact@v4
        with:
          name: ipa
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Fellow Drink ${{ github.ref_name }}"
          body: |
            ## Fellow Drink ${{ github.ref_name }}

            ### Téléchargements
            - 📱 **Android** : télécharge le fichier `.apk` ci-dessous
            - 🍎 **iOS** : disponible via TestFlight (lien à venir)

            ### Installation Android
            1. Télécharge `fellow_drink_${{ github.ref_name }}.apk`
            2. Sur ton téléphone : Paramètres → Sécurité → Sources inconnues ✓
            3. Ouvre le fichier APK téléchargé
          files: |
            fellow_drink_*.apk
            fellow_drink_*.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
